name: 💬 お問い合わせ
description: ご質問・ご意見・お仕事のご相談などはこちらからお願いします
title: "[お問い合わせ] "
labels: ["inquiry"]
body:
  - type: dropdown
    id: category
    attributes:
      label: 種別
      description: 近いものを選んでください
      options:
        - 質問
        - アイデアへのコメント・感想
        - お仕事のご相談
        - その他
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: お問い合わせ内容
      description: できるだけ具体的にご記入ください
      placeholder: ここに内容を書いてください
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ※ 返信はこのIssue上のコメントで行います。コメントが付くとGitHubから通知が届きます。
        ※ メールアドレス等の個人情報は書かないでください（このページは公開されます）。
